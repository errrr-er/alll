<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>JSON → CSV 转换器</title>
<style>
  body { font-family: sans-serif; margin: 20px; }
  .container { display: flex; gap: 20px; }
  textarea, pre { width: 100%; height: 400px; }
  .column { flex: 1; display: flex; flex-direction: column; }
  button { margin-top: 10px; padding: 5px 10px; }
  #copyMessage { color: green; margin-top: 5px; font-weight: bold; }
</style>
</head>
<body>

<h2>JSON → CSV 转换器</h2>
<div class="container">
  <div class="column">
    <h3>CSV 输出</h3>
    <pre id="csvOutput"></pre>
  </div>
  <div class="column">
    <h3>JSON 输入</h3>
    <textarea id="jsonInput" placeholder="粘贴你的 JSON 数据"></textarea>
    <button onclick="convertJSONtoCSV()">生成 CSV</button>
    <button onclick="copyCSV()">复制 CSV</button>
    <span id="copyMessage"></span>
  </div>
</div>

<script>
function convertJSONtoCSV() {
  let input = document.getElementById('jsonInput').value;
  let output = '';
  try {
    let data = JSON.parse(input);
    for (let key in data) {
      if (data[key] !== "" && data[key] !== null && data[key] !== undefined) {
        output += `${key}, ${data[key]},zh-CN\n`;
      }
    }
    document.getElementById('csvOutput').textContent = output;
    document.getElementById('copyMessage').textContent = ''; // 清空提示
  } catch (e) {
    document.getElementById('csvOutput').textContent = 'JSON解析错误，请检查格式';
    document.getElementById('copyMessage').textContent = '';
  }
}

function copyCSV() {
  const csvText = document.getElementById('csvOutput').textContent;
  navigator.clipboard.writeText(csvText).then(() => {
    document.getElementById('copyMessage').textContent = '已复制';
  });
}
</script>

</body>
</html>
