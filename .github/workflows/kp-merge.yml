name: kp merge

on:
  workflow_dispatch:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  update-js:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'kp-pr')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate groupMap from database and update JS file
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");

            const dbPath = "call_of_cthulhu/kp/issues_base/database.json";
            const jsPath = "call_of_cthulhu/kp/a_kp_all.js";

            if (!fs.existsSync(dbPath)) {
              console.error("❌ database.json not found");
              process.exit(1);
            }

            const entries = JSON.parse(fs.readFileSync(dbPath, "utf8"));

            const groupMap = {};
            for (const entry of entries) {
              groupMap[entry.key] = {
                groupNumber: entry.groupNumber,
                ...(entry.aliases && { aliases: entry.aliases })
              };
            }

            let jsContent = fs.readFileSync(jsPath, "utf8");

            const timestamp = Math.floor(Date.now() / 1000);
            jsContent = jsContent.replace(
              /(\/\/ @timestamp\s+)\d+/,
              "$1" + timestamp
            );
            jsContent = jsContent.replace(
              /(return\s+)\d+(;)/,
              "$1" + timestamp + "$2"
            );

            const keys = Object.keys(groupMap);
            const groupMapLines = [];
            groupMapLines.push("const groupMap = {");
            for (let i = 0; i < keys.length; i++) {
              const key = keys[i];
              const value = groupMap[key];
              const comma = i < keys.length - 1 ? "," : "";
              const aliasesStr = value.aliases && value.aliases.length > 0 
                ? ", aliases: " + JSON.stringify(value.aliases)
                : "";
              groupMapLines.push("\t" + JSON.stringify(key) + ": { groupNumber: " + JSON.stringify(value.groupNumber) + aliasesStr + " }" + comma);
            }
            groupMapLines.push("};");
            const newGroupMapBlock = groupMapLines.join("\n");

            const groupMapRegex = /const groupMap = \{[\s\S]*?\n\};/;
            if (!groupMapRegex.test(jsContent)) {
              console.error("❌ Could not locate groupMap block in JS file using regex");
              process.exit(1);
            }
            jsContent = jsContent.replace(groupMapRegex, newGroupMapBlock);

            console.log("🔧 Updated timestamp to:", timestamp);
            console.log(`📦 Replaced groupMap with ${keys.length} entries.`);

            fs.writeFileSync(jsPath, jsContent, "utf8");
            
            console.log("✅ JS file updated successfully");
          '

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add call_of_cthulhu/kp/a_kp_all.js
          git commit -m "chore: update timestamp and groupMap from PR #${{ github.event.pull_request.number }}" || echo "No changes to commit"
          git pull --rebase origin main
          git push
