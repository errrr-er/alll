name: auto pack

on:
  workflow_dispatch:
  push:
    paths:
      - 'call_of_cthulhu/kp/a_kp_all.js'
      - 'call_of_cthulhu/kp/oliva_kp_all/**'
      - 'dice_common/silence/a_silence.js'

permissions:
  contents: write

concurrency:
  group: coc_kp
  cancel-in-progress: false

jobs:
  pack:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create output folder
      run: mkdir -p auto_pack

    # KP群（插件|海豹）
    - name: Pack seal_kp.zip
      run: |
        zip -j auto_pack/seal_kp.zip call_of_cthulhu/kp/a_kp_all.js

    # KP群（插件|青果）
    - name: Pack oliva_kp.opk
      run: |
        cd call_of_cthulhu/kp/oliva_kp_all

        zip -r ../../../auto_pack/oliva_kp.zip . -j

        cd -

        mv auto_pack/oliva_kp.zip auto_pack/oliva_kp.opk

    # 沉默提醒（插件|海豹）
    - name: Pack seal_silence.zip
      run: |
        zip -j auto_pack/seal_silence.zip dice_common/silence/a_silence.js

    - name: Commit
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add auto_pack/

        if ! git diff --cached --quiet; then
          git commit -m "auto pack"
          git pull --rebase origin main
          git push origin HEAD:${GITHUB_REF#refs/heads/}
        else
          echo "No changes to commit"
        fi
