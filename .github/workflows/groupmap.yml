name: GroupMap Processor

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run build.js
        run: node call_of_cthulhu/kp/base_function/build.js
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Sync with remote (pull before push)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git pull --rebase origin main

      - name: Commit changes
        run: |
          git add .
          git commit -m "update groupmap" || echo "no changes"

      - name: Push changes
        run: |
          git push origin main
