name: GroupMap Processor

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm i pinyin

      - name: Run build
        run: node call_of_cthulhu/kp/base_function/build.js
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Check output exists
        id: check
        run: |
          if [ -f call_of_cthulhu/kp/base_function/result/groupmap.json ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: groupmap
          path: call_of_cthulhu/kp/base_function/result/

  pr:
    needs: build
    if: needs.build.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: groupmap
          path: call_of_cthulhu/kp/base_function/result/

      - name: Create branch + commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          BRANCH=auto/groupmap-${{ github.event.issue.number }}
          git checkout -b $BRANCH

          git add call_of_cthulhu/kp/base_function/result/

          git commit -m "update groupmap #${{ github.event.issue.number }}" || echo "no changes"
          git push origin $BRANCH

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/groupmap-${{ github.event.issue.number }}
          title: "[groupmap] issue #${{ github.event.issue.number }}"
          body: |
            Auto generated from issue #${{ github.event.issue.number }}
            Closes #${{ github.event.issue.number }}
          base: main
