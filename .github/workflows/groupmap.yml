name: GroupMap Processor

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm i pinyin

      - name: Run build
        run: node call_of_cthulhu/kp/base_function/build.js
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Commit & Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "update groupmap from issue #${{ github.event.issue.number }}"
          title: "[groupmap] issue #${{ github.event.issue.number }}"
          body: |
            Auto generated from issue #${{ github.event.issue.number }}

            Closes #${{ github.event.issue.number }}
          branch: auto/groupmap-${{ github.event.issue.number }}
          base: main
          add-paths: |
            call_of_cthulhu/kp/base_function/result/
