name: GroupMap Processor

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm i pinyin

      - name: Run build
        run: node call_of_cthulhu/kp/base_function/build.js
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Create PR branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          BRANCH=auto/groupmap-${{ github.event.issue.number }}

          git checkout -b $BRANCH

          git add call_of_cthulhu/kp/base_function/result/

          git commit -m "update groupmap from issue #${{ github.event.issue.number }}" || echo "no changes"

          git push origin $BRANCH

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/groupmap-${{ github.event.issue.number }}
          title: "[groupmap] issue #${{ github.event.issue.number }}"
          body: "Auto generated from issue"
          base: main
