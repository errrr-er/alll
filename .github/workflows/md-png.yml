name: md to png

on:
  workflow_dispatch:
  push:
    paths:
      - 'readme_pic/cat/**'
      - 'assets/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install tools
        run: |
          sudo apt update
          sudo apt install -y pandoc fonts-noto-cjk chromium

      - name: prepare assets
        run: |
          mkdir -p readme_pic/cat/assets
          cp -r assets/* readme_pic/cat/assets/

      - name: md -> html
        run: |
          find readme_pic/cat -name "*.md" | while read file; do
            dir=$(dirname "$file")
            name=$(basename "$file" .md)

            pandoc "$file" \
              -f markdown \
              -t html5 \
              --standalone \
              --metadata title=" " \
              --css=assets/styles/cat_readme.css \
              -o "$dir/$name.html"
          done

      - name: html -> png
        run: |
          find readme_pic/cat -name "*.html" | while read file; do
            png="${file%.html}.png"

            echo "Rendering $file -> $png"

            chromium \
              --headless \
              --no-sandbox \
              --disable-gpu \
              --window-size=900,1200 \
              --screenshot="$png" \
              "file://$(realpath $file)"
          done

      - name: cleanup html
        run: find readme_pic/cat -name "*.html" -delete

      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add readme_pic/cat

          git diff --cached --quiet && echo "no changes" || (
            git commit -m "md to png"
            git pull --rebase origin main
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          else
            echo "No changes to commit"
          fi
          )
