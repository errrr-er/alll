name: md to png

on:
  workflow_dispatch:
  push:
    paths:
      - 'readme_pic/cat/**'
      - 'assets/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y pandoc fonts-noto-cjk

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install -g puppeteer

      - name: Prepare assets
        run: |
          mkdir -p readme_pic/cat/assets
          cp -r assets/* readme_pic/cat/assets/

      - name: Convert MD to HTML
        run: |
          find readme_pic/cat -name "*.md" | while read file; do
            dir=$(dirname "$file")
            name=$(basename "$file" .md)

            pandoc "$file" \
              -f markdown \
              -t html5 \
              --standalone \
              --metadata title=" " \
              --css=assets/styles/cat_readme.css \
              -o "$dir/$name.html"
          done

      - name: HTML to PNG (full page)
        run: |
          find readme_pic/cat -name "*.html" | while read file; do
            png="${file%.html}.png"
            echo "Rendering $file -> $png"

            # 使用 Puppeteer 进行全页面截图
            node -e "
              const puppeteer = require('puppeteer');
              (async () => {
                const browser = await puppeteer.launch({ headless: true, args: ['--no-sandbox', '--disable-gpu'] });
                const page = await browser.newPage();
                await page.setViewport({ width: 900, height: 800 });
                await page.goto('file://' + process.cwd() + '/$file', { waitUntil: 'networkidle0' });
                await page.screenshot({ path: '$png', fullPage: true });
                await browser.close();
              })();
            "
          done

      - name: Cleanup HTML files
        run: find readme_pic/cat -name "*.html" -delete

      - name: Commit PNGs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add readme_pic/cat

          if ! git diff --cached --quiet; then
            git commit -m "md to png (full page screenshot)"
            git pull --rebase origin main
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          else
            echo "No changes to commit"
          fi
