name: md to png

on:
  workflow_dispatch:
  push:
    paths:
      - 'readme_pic/cat/**'
      - 'assets/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install deps
        run: |
          sudo apt update
          sudo apt install -y pandoc fonts-noto-cjk chromium-browser

      - name: prepare assets (fix path)
        run: |
          mkdir -p build_assets
          cp -r assets build_assets/

          mkdir -p readme_pic/cat/assets
          cp -r assets/* readme_pic/cat/assets/

      - name: md -> html
        run: |
          for file in $(find readme_pic/cat -name "*.md"); do
            dir=$(dirname "$file")
            name=$(basename "$file" .md)

            pandoc "$file" \
              -f markdown \
              -t html5 \
              --standalone \
              --metadata title=" " \
              --css=assets/styles/cat_readme.css \
              -o "$dir/$name.html"
          done

      - name: html -> full page screenshot
        run: |
          for file in $(find readme_pic/cat -name "*.html"); do
            png="${file%.html}.png"

            chromium-browser \
              --headless \
              --disable-gpu \
              --no-sandbox \
              --hide-scrollbars \
              --virtual-time-budget=20000 \
              --window-size=900,2000 \
              --screenshot="$png" \
              "file://$(realpath $file)"

            # 成功才删 html
            if [ -f "$png" ]; then
              rm "$file"
            fi
          done

      - name: commit png only
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add readme_pic/cat

          if ! git diff --cached --quiet; then
            git commit -m "md to png"
            git pull --rebase origin main
            git push
          fi
