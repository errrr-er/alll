name: md to png

on:
  workflow_dispatch:
  push:
    paths:
      - 'readme_pic/cat/**'
      - '!auto_pack/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install tools + fonts
        run: |
          sudo apt update
          sudo apt install -y pandoc wkhtmltopdf fontconfig fonts-noto-cjk

      # 把 assets 拷贝到 cat 目录下（关键）
      - name: prepare assets
        run: |
          mkdir -p readme_pic/cat/assets/fonts
          mkdir -p readme_pic/cat/assets/styles

          cp -r assets/fonts/* readme_pic/cat/assets/fonts/
          cp -r assets/styles/* readme_pic/cat/assets/styles/

      - name: convert md to png
        run: |
          find readme_pic/cat -name "*.md" | while read file; do
            dir=$(dirname "$file")
            name=$(basename "$file" .md)

            html="$dir/$name.html"
            png="$dir/$name.png"

            # md -> html
            pandoc "$file" \
              -f markdown \
              -t html5 \
              --standalone \
              --metadata charset=utf-8 \
              --css=assets/styles/cat_readme.css \
              -o "$html"

            # html -> png
            wkhtmltoimage \
              --encoding utf-8 \
              --enable-local-file-access \
              --width 800 \
              "$html" "$png"

            # 成功才删 html
            if [ -s "$png" ]; then
              rm "$html"
            fi

          done

          echo "==== files ===="
          ls -R

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgs
          path: "**/*.png"

      - name: commit png
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add readme_pic/cat/

          if ! git diff --cached --quiet; then
            git commit -m "md to png"
            git pull --rebase origin main
            git push
          else
            echo "no changes"
          fi
