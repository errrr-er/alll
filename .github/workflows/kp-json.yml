name: kp json

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["kp merge"]
    types:
      - completed
  push:
    paths:
      - 'call_of_cthulhu/kp/a_kp_all.js'

permissions:
  contents: write

concurrency:
  group: coc_kp
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate JSON
        run: |
          node -e "
          const fs = require('fs');
          const content = fs.readFileSync('call_of_cthulhu/kp/a_kp_all.js', 'utf8');

          // 取 groupMap
          const mapMatch = content.match(/const groupMap = ({[\s\S]*?});/);
          if (!mapMatch) throw 'no groupMap';
          const groupMap = eval('(' + mapMatch[1] + ')');

          // 取 @timestamp
          const tsMatch = content.match(/@timestamp\s+(\d+)/);
          const timestamp = tsMatch ? Number(tsMatch[1]) : Math.floor(Date.now()/1000);

          // 取 @version
          const verMatch = content.match(/@version\s+([\\d\\.]+)/);
          const version = verMatch ? verMatch[1] : 'auto';

          // 拼接 JSON，每个群一行
          const lines = Object.entries(groupMap).map(([k, v]) => \`\"\${k}\": \${JSON.stringify(v)}\`);
          const finalJson = \`{\n  \"version\": \"\${version}\",\n  \"timestamp\": \${timestamp},\n  \"group_map\": {\n    \${lines.join(\",\\n    \")}\n  }\n}\`;

          fs.writeFileSync('call_of_cthulhu/kp/kp_groupMap.json', finalJson);
          console.log('done');
          "

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
      
          git add call_of_cthulhu/kp/kp_groupMap.json
      
          if ! git diff --cached --quiet; then
            git commit -m "KP json"
            git pull --rebase origin main
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          else
            echo "No changes to commit"
          fi
