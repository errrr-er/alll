name: kp issue

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'kp-data')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Parse and Validate Issue Body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const body = context.payload.issue.body;
            const issueNumber = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const baseDir = 'call_of_cthulhu/kp/issues_base';
            if (!fs.existsSync(baseDir)) {
              fs.mkdirSync(baseDir, { recursive: true });
            }

            async function addLabel(label) {
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: issueNumber,
                labels: [label]
              });
            }

            async function commentError(msg) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issueNumber,
                body: `❌ **处理失败**\n\n${msg}\n\n请修正后重新编辑 Issue 内容，或手动处理。`
              });
            }

            const match = body.match(/### 数据内容\s+```json\s*([\s\S]*?)\s*```/);
            if (!match) {
              await addLabel('kp-review');
              await commentError('未找到数据内容，请确保在 `数据内容` 文本框的 JSON 代码块中填写。');
              core.setFailed('未找到数据内容');
              return;
            }

            let data;
            try {
              data = JSON.parse(match[1]);
            } catch (e) {
              await addLabel('bug');
              await commentError(`JSON 格式无效：${e.message}`);
              core.setFailed('JSON 解析失败');
              return;
            }

            const errors = [];
            for (const [key, value] of Object.entries(data)) {
              if (!key || key.trim() === '') {
                errors.push(`键名不能为空字符串`);
                continue;
              }
              if (!value.groupNumber || typeof value.groupNumber !== 'string') {
                errors.push(`键 "${key}" 缺少 groupNumber 或格式不正确`);
              }
              if (value.aliases !== undefined && !Array.isArray(value.aliases)) {
                errors.push(`键 "${key}" 的 aliases 必须是数组`);
              }
            }

            if (errors.length > 0) {
              await addLabel('kp-review');
              await commentError(`数据校验未通过：\n- ${errors.join('\n- ')}`);
              core.setFailed('数据校验失败');
              return;
            }

            for (const key of Object.keys(data)) {
              if (!data[key].aliases) {
                data[key].aliases = [];
              } else {
                data[key].aliases = data[key].aliases.filter(a => a && a.trim() !== '');
              }
            }

            const submittedPath = path.join(baseDir, 'submitted_data.json');
            fs.writeFileSync(submittedPath, JSON.stringify({
              data: data,
              issue_number: issueNumber,
              user: context.payload.issue.user.login
            }, null, 2));

      - name: Run Validation & Generate Report
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const baseDir = 'call_of_cthulhu/kp/issues_base';
            const dbPath = path.join(baseDir, 'database.json');
            const submittedPath = path.join(baseDir, 'submitted_data.json');

            const submitted = JSON.parse(fs.readFileSync(submittedPath, 'utf8'));

            let existing = [];
            if (fs.existsSync(dbPath)) {
              try {
                existing = JSON.parse(fs.readFileSync(dbPath, 'utf8'));
                if (!Array.isArray(existing)) existing = [];
              } catch {
                existing = [];
              }
            }

            const newEntries = Object.entries(submitted.data).map(([key, val]) => ({
              key: key,
              groupNumber: val.groupNumber,
              aliases: val.aliases || []
            }));

            const report = [];
            const allExistingGroups = existing.map(e => e.groupNumber);

            // 1. 检查群号完全重复（与已有数据）
            for (const entry of newEntries) {
              if (allExistingGroups.includes(entry.groupNumber)) {
                const conflict = existing.find(e => e.groupNumber === entry.groupNumber);
                report.push(`⚠️ 群号 \`${entry.groupNumber}\` (本次提交键: ${entry.key}) 已存在于已有键 \`${conflict.key}\`，提交后将覆盖。`);
              }
            }

            // 2. 检查群号部分相似（包含关系）
            for (const entry of newEntries) {
              const similar = existing.filter(e => 
                e.groupNumber.includes(entry.groupNumber) || entry.groupNumber.includes(e.groupNumber)
              );
              if (similar.length > 0 && !allExistingGroups.includes(entry.groupNumber)) {
                const similarInfo = similar.map(s => `\`${s.groupNumber}\` (键: ${s.key})`).join(', ');
                report.push(`🔍 群号 \`${entry.groupNumber}\` 与已有群号相似：${similarInfo}`);
              }
            }

            // 3. 检查别名冲突（与已有数据）
            for (const entry of newEntries) {
              for (const alias of entry.aliases) {
                const conflictEntries = existing.filter(e => e.aliases && e.aliases.includes(alias));
                if (conflictEntries.length > 0) {
                  const conflictInfo = conflictEntries.map(c => `\`${c.key}\``).join('、');
                  report.push(`🔄 别名冲突：\`${alias}\` (本次提交键: ${entry.key}) 已存在于已有键: ${conflictInfo}`);
                }
              }
            }

            // 4. 检查新数据内部群号重复
            const groupNumberMap = new Map();
            for (const entry of newEntries) {
              const num = entry.groupNumber;
              if (!groupNumberMap.has(num)) {
                groupNumberMap.set(num, []);
              }
              groupNumberMap.get(num).push(entry.key);
            }
            for (const [num, keys] of groupNumberMap.entries()) {
              if (keys.length > 1) {
                report.push(`❌ 提交数据内部群号重复：群号 \`${num}\` 同时出现在键: ${keys.map(k => `\`${k}\``).join('、')}`);
              }
            }

            // 5. 检查新数据内部别名重复
            const aliasMap = new Map();
            for (const entry of newEntries) {
              for (const alias of entry.aliases) {
                if (!aliasMap.has(alias)) {
                  aliasMap.set(alias, []);
                }
                aliasMap.get(alias).push(entry.key);
              }
            }
            for (const [alias, keys] of aliasMap.entries()) {
              if (keys.length > 1) {
                report.push(`🟡 提交数据内部别名重复：别名 \`${alias}\` 同时出现在键: ${keys.map(k => `\`${k}\``).join('、')}`);
              }
            }

            // ===== 新增：key 覆盖提示 =====
            const existingKeyMap = new Map(existing.map(e => [e.key, e]));
            for (const entry of newEntries) {
              if (existingKeyMap.has(entry.key)) {
                const old = existingKeyMap.get(entry.key);
                const oldAliases = (old.aliases || []).join(', ');
                const newAliases = (entry.aliases || []).join(', ');
                // 如果群号完全一样，特别提醒
                if (old.groupNumber === entry.groupNumber) {
                  report.push(
                    `ℹ️ 键 \`${entry.key}\` 已存在，群号没有变化（\`${entry.groupNumber}\`），仅别名可能更新。\n` +
                    `- 原别名：${oldAliases || '无'}\n` +
                    `- 新别名：${newAliases || '无'}`
                  );
                } else {
                  report.push(
                    `🔄 覆盖提示：键 \`${entry.key}\` 已存在。\n` +
                    `- 原群号：\`${old.groupNumber}\`\n` +
                    `- 新群号：\`${entry.groupNumber}\`\n` +
                    (oldAliases || newAliases ? `- 原别名：${oldAliases || '无'}\n- 新别名：${newAliases || '无'}` : '')
                  );
                }
              }
            }

            // ===== 新增：键名相近检测（简单包含） =====
            for (const entry of newEntries) {
              const similarKeys = existing
                .filter(e => e.key !== entry.key)
                .filter(e => e.key.includes(entry.key) || entry.key.includes(e.key));
              if (similarKeys.length > 0) {
                const keyList = similarKeys.map(e => `\`${e.key}\``).join('、');
                report.push(`🔍 键名相近提示：\`${entry.key}\` 与已有键 ${keyList} 可能存在重复，请确认。`);
              }
            }

            const reportContent = report.length ? report.join('\n\n') : '✅ 所有检查通过，未发现冲突或异常。';
            
            const reportPath = path.join(baseDir, 'report.md');
            fs.writeFileSync(reportPath, reportContent);

            const prBody = `关联 Issue: #${submitted.issue_number}
            提交者: @${submitted.user}

            ## 📊 校验报告
            ${reportContent}`;
            const prBodyPath = path.join(baseDir, 'pr_body.md');
            fs.writeFileSync(prBodyPath, prBody);

            const newEntriesPath = path.join(baseDir, 'new_entries.json');
            fs.writeFileSync(newEntriesPath, JSON.stringify(newEntries, null, 2));

      - name: Update Database File
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const baseDir = 'call_of_cthulhu/kp/issues_base';
            const dbPath = path.join(baseDir, 'database.json');
            const newEntriesPath = path.join(baseDir, 'new_entries.json');

            let existing = [];
            if (fs.existsSync(dbPath)) {
              try { existing = JSON.parse(fs.readFileSync(dbPath, 'utf8')); } catch { existing = []; }
              if (!Array.isArray(existing)) existing = [];
            }

            const newEntries = JSON.parse(fs.readFileSync(newEntriesPath, 'utf8'));

            // ===== 修改：合并逻辑取代直接覆盖 =====
            for (const entry of newEntries) {
              const idx = existing.findIndex(e => e.key === entry.key);
              if (idx >= 0) {
                // 群号合并：如果新群号不同于旧群号，则用换行追加；如果相同，不追加，避免重复
                const oldGroup = existing[idx].groupNumber;
                if (oldGroup !== entry.groupNumber) {
                  entry.groupNumber = oldGroup + '\n' + entry.groupNumber;
                } else {
                  // 群号相同，保持原 groupNumber（已经是 oldGroup）
                  entry.groupNumber = oldGroup;
                }
                // 别名合并：保留旧的，并添加新的（去重）
                const oldAliases = existing[idx].aliases || [];
                const newAliases = entry.aliases || [];
                entry.aliases = [...new Set([...oldAliases, ...newAliases])];
                existing[idx] = entry;
              } else {
                existing.push(entry);
              }
            }

            existing.sort((a, b) => {
              return a.key.localeCompare(b.key, 'zh-CN', { sensitivity: 'base' });
            });

            // 清理空别名数组
            for (const entry of existing) {
              if (entry.aliases && entry.aliases.length === 0) {
                delete entry.aliases;
              }
            }

            fs.writeFileSync(dbPath, JSON.stringify(existing, null, 2));
          "

      - name: Debug - List generated files
        run: |
          echo "=== 检查目标目录文件 ==="
          ls -la call_of_cthulhu/kp/issues_base/ || echo "目录不存在"
          echo "=== database.json 内容 ==="
          cat call_of_cthulhu/kp/issues_base/database.json || echo "文件不存在"
          echo "=== Git 状态 ==="
          git status

      - name: Clean up temporary files before PR
        run: |
          rm -f call_of_cthulhu/kp/issues_base/new_entries.json
          rm -f call_of_cthulhu/kp/issues_base/submitted_data.json
          echo "已清理临时文件，保留 database.json, report.md, pr_body.md"

      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = ['kp-pr'];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label
                });
                console.log(`✅ Label "${label}" already exists`);
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: '0052cc'
                  });
                  console.log(`🆕 Created label "${label}"`);
                } else {
                  throw error;
                }
              }
            }

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          commit-message: "data: update from issue #${{ github.event.issue.number }}"
          branch: "kp-data/issue-${{ github.event.issue.number }}"
          title: "[KP数据更新] Issue #${{ github.event.issue.number }}"
          body-path: call_of_cthulhu/kp/issues_base/pr_body.md
          labels: "kp-pr"
          delete-branch: true

      - name: Clean up PR body file
        if: always()
        run: rm -f call_of_cthulhu/kp/issues_base/pr_body.md
        
      - name: Comment Success on Issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.create-pr.outputs.pull-request-number }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `✅ 数据已处理，并创建 PR #${prNumber} 等待审核。\n\n详细校验报告请查看 PR 描述。`
            });

      - name: Add kp-pr label to Issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['kp-pr']
            });
            console.log(`🏷️ Added 'kp-pr' label to issue #${context.payload.issue.number}`);
